[server]
debug_mode = 1
http_port  = 8866
http_addr  = 127.0.0.1
static_path = web/static
adapters   = hexitec, proxy, munir
enable_cors = true

[tornado]
logging = debug

[adapter.hexitec]
module = hexitec.adapter.HexitecAdapter
user_level = power
# power/basic

[adapter.proxy]
module = odin.adapters.proxy.ProxyAdapter
targets = 
    loki = http://192.168.0.190:8888/api/0.1/lokicarrier/,
    adxdma = http://192.168.0.43:8888/api/0.1/xdmaAdapter/
request_timeout = 1.0

[adapter.munir]
module = munir.adapter.MunirAdapter
fp_mode = 1
liveview_control = 1
ctrl_timeout = 1.0
poll_interval = 0.5
odin_data_config_path = web/config
subsystems = hexitec_mhz
hexitec_mhz_endpoints = tcp://127.0.0.1:5000
