[server]
debug_mode = 1
http_port  = 8866
http_addr  = 127.0.0.1
static_path = web/static
adapters   = hexitec, proxy, munir, xdma
enable_cors = true

[tornado]
logging = debug

[adapter.hexitec]
module = hexitec.adapter.HexitecAdapter
user_type = power
# power/basic
task_interval = 1
check_interval = 5
lane_timeout = 60
channel_timeout = 60
max_retries = 3
frame_check_interval = 0.5
event_history = 100

[adapter.proxy]
module = odin.adapters.proxy.ProxyAdapter
targets = 
    loki = http://192.168.0.190:8888/api/0.1/lokicarrier/
request_timeout = 1.0

[adapter.munir]
module = munir.adapter.MunirAdapter
fp_mode = 1
liveview_control = 1
ctrl_timeout = 1.0
poll_interval = 0.5
odin_data_config_path = web/config
subsystems = hexitec_mhz
hexitec_mhz_endpoints = tcp://127.0.0.1:5000

[adapter.xdma]
module = mhz_control.adapter.MHZAdapter
ctrl_timeout = 1.0
poll_interval = 0.5
xdma_card = 1
path_to_reg_defs = web/config/adxdma/hexitec_mhz_dual_hist_nosi5328.xml
generate_json = True
communication_type = xdma
